# Nginx for AI Notes:
#   Base URL (/)        → frontend (Next.js on 3000)
#   /api/* and /docs    → backend (NestJS on 3001); /api is stripped when forwarding
# Copy to /etc/nginx/sites-available/default, then: sudo nginx -t && sudo systemctl reload nginx
# Ports: frontend = 3000, backend = 3001.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Backend API (NestJS) on 3001 – /api/* → backend with /api stripped
    location /api/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger docs on backend (3001)
    location /docs {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend (Next.js) on 3000 – everything else (/, /notes, _next, etc.)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

