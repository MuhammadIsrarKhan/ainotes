# Nginx snippet for AI Notes (single server: /api -> backend, / -> frontend)
# Copy to /etc/nginx/sites-available/default or include in your server block.
# Set $APP_DOMAIN to your domain or _ for default_server.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Backend API (NestJS) – requests to /api/* are forwarded to port 3001 with /api stripped
    location /api/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend (Next.js) – everything else to port 3000
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

