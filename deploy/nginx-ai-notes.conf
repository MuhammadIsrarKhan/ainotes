# Nginx snippet for AI Notes (single server: / -> frontend, /api -> backend)
# Copy to /etc/nginx/sites-available/default or include in your server block.
# Ports: frontend (Next.js) = 3000, backend (NestJS) = 3001.
# If you see / = backend and /api = frontend, the proxy_pass ports were swapped.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Frontend (Next.js) on port 3000 – root and all non-/api traffic
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API (NestJS) on port 3001 – /api/* forwarded with /api prefix stripped
    location /api/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

