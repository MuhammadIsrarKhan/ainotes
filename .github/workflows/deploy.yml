# Deploy AI Notes to EC2 on push to main.
# Secrets: EC2_HOST (e.g. ubuntu@1.2.3.4), EC2_SSH_KEY (private key PEM).
# Variable: NEXT_PUBLIC_API_URL (e.g. https://yourdomain.com/api) for frontend build.

name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build backend
        run: |
          cd backend
          pnpm install --frozen-lockfile
          pnpm run prisma:generate
          pnpm run build

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost/api' }}
        run: |
          cd frontend
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key.pem "$EC2_HOST" "mkdir -p ainotes"
          rsync -avz -e "ssh -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no" \
            --exclude 'node_modules' \
            --exclude '.next/cache' \
            --exclude 'backend/.env' \
            --exclude 'frontend/.env.local' \
            backend/ "$EC2_HOST:ainotes/backend/"
          rsync -avz -e "ssh -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no" \
            --exclude 'node_modules' \
            --exclude '.next/cache' \
            --exclude 'frontend/.env.local' \
            frontend/ "$EC2_HOST:ainotes/frontend/"
          rsync -avz -e "ssh -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no" \
            deploy/ "$EC2_HOST:ainotes/deploy/"
          ssh -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no "$EC2_HOST" \
            'cd ainotes/backend && npx pnpm install --frozen-lockfile && npx pnpm run prisma migrate deploy; cd ../frontend && npx pnpm install --frozen-lockfile --prod; cd .. && pm2 reload deploy/ecosystem.config.cjs --update-env || pm2 start deploy/ecosystem.config.cjs'
